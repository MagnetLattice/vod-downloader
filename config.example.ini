# Twitch VOD Downloader Configuration
# Copy this file to config.ini and fill in your credentials.

# === TWITCH API SETUP ===
# 1. Go to https://dev.twitch.tv/console
# 2. Log in with your Twitch account
# 3. Click "Register Your Application"
# 4. Fill in:
#    - Name: anything (e.g., "VOD Downloader")
#    - OAuth Redirect URLs: http://localhost:17563
#    - Category: Application Integration
# 5. Click "Create"
# 6. Click "Manage" on your new application
# 7. Copy the Client ID below
# 8. Click "New Secret" and copy the Client Secret below
[twitch]
client_id = YOUR_TWITCH_CLIENT_ID
client_secret = YOUR_TWITCH_CLIENT_SECRET

# === YOUTUBE API SETUP ===
# 1. Go to https://console.cloud.google.com
# 2. Create a new project (or select an existing one)
# 3. Enable the "YouTube Data API v3":
#    - Go to APIs & Services > Library
#    - Search for "YouTube Data API v3"
#    - Click Enable
# 4. Configure the OAuth consent screen:
#    - Go to APIs & Services > OAuth consent screen
#    - User Type: External (or Internal if using Google Workspace)
#    - Fill in app name and your email
#    - Add scope: .../auth/youtube
#    - Add yourself as a test user
# 5. Create OAuth 2.0 credentials:
#    - Go to APIs & Services > Credentials
#    - Click "Create Credentials" > "OAuth client ID"
#    - Application type: Desktop app
#    - Name: anything (e.g., "VOD Uploader")
#    - Click "Create"
# 6. Download the JSON file and save it as client_secrets.json
#    next to this config file (or specify a different path below)
# 7. On first run, a browser window will open for you to authorize the app.
#    The token is saved to youtube_token.json for future runs.
[youtube]
client_secrets_file = client_secrets.json

# === GENERAL SETTINGS ===
# Path to yt-dlp executable. If yt-dlp is on your PATH, just use "yt-dlp".
# On Windows you might need the full path, e.g.: C:/tools/yt-dlp.exe
[general]
ytdlp_path = yt-dlp

# === FINDING TWITCH USER IDS ===
# You can look up a user's numeric ID at:
#   https://www.streamweasels.com/tools/convert-twitch-username-to-user-id/
# Or use the Twitch API directly:
#   curl -H "Client-ID: YOUR_ID" -H "Authorization: Bearer YOUR_TOKEN" \
#     "https://api.twitch.tv/helix/users?login=USERNAME"
